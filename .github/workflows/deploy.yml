name: Build and Deploy

on:
  push:
    branches:
      - master   # 监听 master 分支的 push 事件

jobs:
  build:
    runs-on: ubuntu-latest
    environment: product
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get short SHA for tagging
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/personal_navigation_page:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/personal_navigation_page:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: product
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.REMOTE_PATH }}
            echo "Current IMAGE_TAG is: ${IMAGE_TAG}"
            docker images zenithzjt/personal_navigation_page --format "table {{.Tag}}\t{{.ID}}\t{{.CreatedAt}}"
            export IMAGE_TAG="${{ needs.build.outputs.sha_short }}"
            echo "After export, IMAGE_TAG is: ${IMAGE_TAG}"
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f